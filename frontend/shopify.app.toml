# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b04a4ca34b41318b2c1a92fb5f427563"
name = "Optimo-Virtual Try-On"
application_url = "https://optimo-virtual-try-on.vercel.app"
embedded = true
web_directories = [ "web" ]

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled", "app_subscriptions/update", "shop/update" ]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/api/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_app_proxy"

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[auth]
redirect_urls = [ "https://optimo-virtual-try-on.vercel.app/api/auth/callback" ]

[app_proxy]
url = "/widget-proxy"
subpath = "optimo-vts"
prefix = "apps"
